name: API Automation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytest pytest-html python-dotenv

    - name: Run Tests
      # We pass the secret token from GitHub Secrets into an Environment Variable
      env:
        API_TOKEN: ${{ secrets.API_TOKEN }}
        APP_ENV: staging
      run: |
        pytest --html=report.html --self-contained-html

    - name: Upload Report
      if: always() # Ensure report uploads even if tests fail
      uses: actions/upload-artifact@v5
      with:
        name: api-test-report
        path: report.html