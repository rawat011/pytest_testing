name: request automation workflow
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  api-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Request Module
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          pytest -v -s test_requests.py --html=report.html --self-contained-html

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-test-results-${{matrix.os}}
          path: report.html
